artItems.innerHTML="";let total=0;cart.forEach((item,index)=>{total+=item.price*item.qty;const div=document.createElement("div");div.innerHTML=`<div>${item.name}<br><small>KSh ${item.price}</small></div><div style="display:flex;align-items:center"><button onclick="changeQty(${index},-1)">−</button><span style="margin:0 8px">${item.qty}</span><button onclick="changeQty(${index},1)">+</button></div>`;cartItems.appendChild(div);});let delivery=parseInt(document.getElementById("deliveryArea").value)||0;total+=delivery;cartTotal.textContent=total;}function sendCart(){if(cart.length===0){alert("Your cart is empty");return;}let message="Hello Dotty Wigs, I want to order:\n\n";let total=0;cart.forEach((item,i)=>{let itemTotal=item.price*item.qty;message+=(i+1)+". "+item.name+" x"+item.qty+" - KSh "+itemTotal+"\n";total+=itemTotal;});let delivery=parseInt(document.getElementById("deliveryArea").value)||0;message+="

='700'>${safe(name)}</text><text x='40' y='520' fill='#bfbfbf' font-size='20' font-family='Arial'>Studio preview — upload your own product image for a real photo</text></g></svg>`;return 'data:image/svg+xml;utf8,'+encodeURIComponent(svg);}document.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('.product img').forEach(img=>{img.onerror=function(){img.src=makeSVGDataURL(img.dataset.name,img.dataset.price);}});});</script></body></html>
